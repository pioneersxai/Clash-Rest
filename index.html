    <style>
        /* ── NAV LAYOUT — matches agency site exactly ── */
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            flex-direction: row-reverse;
        }
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
            margin: 0;
            padding: 0;
            flex-direction: row-reverse;
        }
        .nav-links a {
            color: var(--text-muted, #64748b);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 8px;
            transition: all .3s;
        }
        .nav-links a:hover,
        .nav-links a.active {
            color: var(--navy, #0c4a6e);
            background: var(--lighter, #e0f2fe);
        }
        .nav-links a::after { display: none !important; }
        .nav-cta-btn {
            background: var(--blue, #0ea5e9);
            color: #fff !important;
            padding: 10px 22px !important;
            border-radius: 30px !important;
            font-weight: 600 !important;
            font-size: 14px !important;
        }
        .nav-cta-btn:hover {
            background: var(--blue-dark, #0284c7) !important;
            color: #fff !important;
        }
        .nav-auth-buttons { display: flex; gap: 10px; align-items: center; }
        @media(max-width:992px) {
            .nav-links { display: none !important; }
            .nav-links.active {
                display: flex !important;
                flex-direction: column;
                position: absolute;
                top: 70px;
                right: 20px;
                background: #fff;
                padding: 16px 24px;
                border-radius: 16px;
                box-shadow: 0 8px 32px rgba(0,0,0,.12);
                z-index: 999;
                min-width: 200px;
            }
        }
    </style>
</head>

    <script>
        // Mobile menu toggle
        document.getElementById('mobileMenu').addEventListener('click', function() {
            const nl = document.getElementById('navLinks');
            nl.classList.toggle('active');
        });

        // Highlight active nav link on scroll
        window.addEventListener('scroll', function() {
            const sections = document.querySelectorAll('section[id]');
            const links = document.querySelectorAll('.nav-links a');
            let current = '';
            sections.forEach(s => {
                if (window.scrollY >= s.offsetTop - 100) current = s.getAttribute('id');
            });
            links.forEach(a => {
                a.classList.remove('active');
                if (a.getAttribute('href') === '#' + current) a.classList.add('active');
            });
        });
    </script>
