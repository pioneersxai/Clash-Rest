<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="keywords" content="">
    <meta name="author" content="">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <title>Loading...</title>
    <link rel="icon" type="image/svg+xml" id="favicon" href="">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .nav-container{display:flex;justify-content:space-between;align-items:center;width:100%}
        .nav-links{display:flex;gap:25px;list-style:none;margin:0;padding:0}
        .nav-auth-buttons{display:flex;gap:10px;align-items:center}
        .btn-nav-login{padding:8px 20px;border:1px solid rgba(255,255,255,0.3);border-radius:8px;color:#fff;text-decoration:none;font-size:.9rem;transition:all .3s}
        .btn-nav-signup{padding:8px 20px;background:var(--primary-red);border-radius:8px;color:#fff;text-decoration:none;font-size:.9rem;font-weight:600;transition:all .3s}
        @media(max-width:992px){.nav-links{display:none!important}.nav-links.active{display:flex!important;flex-direction:column}}
    </style>
</head>
<body>
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-outline" id="cursorOutline"></div>
    <div class="loader" id="loader"><div class="loader-spinner"></div></div>

    <!-- NAVBAR -->
    <nav id="navbar">
        <div class="nav-container">
            <a href="#home" class="logo brand-logo"></a>
            <ul class="nav-links" id="navLinks"></ul>
            <div class="nav-auth-buttons" id="nav-auth">
                <a href="./dashboard/register.html" class="btn-nav-signup">إنشاء حساب</a>
                <a href="./dashboard/index.html" class="btn-nav-login">تسجيل الدخول</a>
            </div>
            <div class="mobile-menu-toggle" id="mobileMenu"><i class="fas fa-bars"></i></div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero" id="home">
        <div class="hero-content">
            <div class="hero-tag fade-in"></div>
            <h1 class="hero-title fade-in"></h1>
            <p class="tagline hero-tagline fade-in"></p>
            <p class="hero-description fade-in"></p>
            <div class="hero-buttons fade-in"></div>
        </div>
    </section>

    <!-- STATS -->
    <section class="stats section" id="section-stats">
        <div class="container">
            <div class="stats-grid"></div>
        </div>
    </section>

    <!-- FEATURES -->
    <section class="features section" id="section-features">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="medical-grid"></div>
        </div>
    </section>

    <!-- SERVICES -->
    <section class="services section" id="section-services">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="services-grid"></div>
        </div>
    </section>

    <!-- PRODUCTS -->
    <section class="products section" id="section-products">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="products-grid"></div>
        </div>
    </section>

    <!-- TEAM -->
    <section class="team section" id="section-team">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="team-grid"></div>
        </div>
    </section>

    <!-- PROCESS -->
    <section class="process section" id="section-process">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="process-steps"></div>
        </div>
    </section>

    <!-- CASE STUDIES -->
    <section class="case-studies section" id="section-casestudies">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="case-studies-container"></div>
        </div>
    </section>

    <!-- CLIENTS -->
    <section class="clients section" id="section-clients">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="clients-grid"></div>
        </div>
    </section>

    <!-- TESTIMONIALS -->
    <section class="testimonials section" id="section-testimonials">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="testimonials-grid"></div>
        </div>
    </section>

    <!-- CTA -->
    <section class="cta section" id="section-cta">
        <div class="container">
            <h2 class="cta-title fade-in"></h2>
            <p class="cta-subtitle fade-in"></p>
            <div class="hero-buttons fade-in"></div>
        </div>
    </section>

    <!-- CONTACT -->
    <section class="contact section" id="section-contact">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title fade-in"></h2>
                <p class="section-subtitle fade-in"></p>
            </div>
            <div class="contact-container">
                <div class="contact-info fade-in">
                    <h3>معلومات التواصل</h3>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-phone"></i></div>
                        <div class="contact-details"><h4>الهاتف</h4><p dir="ltr" class="contact-phone"></p></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-envelope"></i></div>
                        <div class="contact-details"><h4>البريد الإلكتروني</h4><p><a class="contact-email" href="#"></a></p></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fab fa-whatsapp"></i></div>
                        <div class="contact-details"><h4>واتساب</h4><p><a class="contact-wa" href="#" target="_blank"></a></p></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="contact-details"><h4>العنوان</h4><p class="contact-city"></p></div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon"><i class="fas fa-clock"></i></div>
                        <div class="contact-details"><h4>ساعات العمل</h4><p class="contact-hours"></p></div>
                    </div>
                </div>
                <form class="contact-form fade-in" id="contactForm">
                    <h3 class="form-title" style="margin-bottom:30px;color:var(--text-white)"></h3>
                    <div class="form-group"><label>الاسم الكامل *</label><input type="text" name="name" required></div>
                    <div class="form-group"><label>البريد الإلكتروني *</label><input type="email" name="email" required></div>
                    <div class="form-group"><label>رقم الهاتف *</label><input type="tel" name="phone" required></div>
                    <div class="form-group"><label>نوع الاستفسار</label>
                        <select id="service" name="service" style="width:100%;padding:15px;background:var(--darker-bg);border:1px solid var(--border-color);border-radius:8px;color:var(--text-white);font-size:1rem;font-family:inherit"></select>
                    </div>
                    <div class="form-group"><label>رسالتك *</label><textarea name="message" required></textarea></div>
                    <button type="submit" class="btn btn-primary" style="width:100%"></button>
                </form>
            </div>
        </div>
    </section>

    <!-- WHATSAPP FLOAT -->
    <a href="#" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <!-- FOOTER -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3 class="footer-brand-name"></h3>
                <p class="footer-about"></p>
                <div class="social-links">
                    <a id="footer-twitter"   href="#" target="_blank"><i class="fab fa-twitter"></i></a>
                    <a id="footer-linkedin"  href="#" target="_blank"><i class="fab fa-linkedin"></i></a>
                    <a id="footer-instagram" href="#" target="_blank"><i class="fab fa-instagram"></i></a>
                    <a id="footer-youtube"   href="#" target="_blank"><i class="fab fa-youtube"></i></a>
                    <a id="footer-tiktok"    href="#" target="_blank"><i class="fab fa-tiktok"></i></a>
                </div>
            </div>
            <div class="footer-dynamic-cols"></div>
            <div class="footer-section">
                <h3>تواصل معنا</h3>
                <p><i class="fas fa-envelope"></i> <a class="footer-contact-email" href="#"></a></p>
                <p><i class="fas fa-phone"></i> <span class="footer-contact-phone"></span></p>
                <p><i class="fab fa-whatsapp"></i> <a class="footer-contact-wa" href="#"></a></p>
                <p><i class="fas fa-map-marker-alt"></i> <span class="footer-contact-city"></span></p>
            </div>
        </div>
        <div class="footer-bottom">
            <p class="footer-copyright"></p>
        </div>
    </footer>

    <div class="scroll-top" id="scrollTop"><i class="fas fa-arrow-up"></i></div>

    <script src="config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/cursor.js"></script>
</body>
</html>
